<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZordPath - Zord Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Press Start 2P', monospace;
            background: #0a0a1a;
            color: #ccc;
            padding: 20px;
            font-size: 10px;
            line-height: 1.8;
        }
        h1 {
            color: #f5c842;
            font-size: 16px;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 8px;
            margin-bottom: 20px;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .filter-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 12px;
            background: #1a1a2e;
            color: #888;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #666; color: #ccc; }
        .filter-btn.active { background: #2a2a4e; color: #f5c842; border-color: #f5c842; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .card {
            background: #12122a;
            border: 1px solid #2a2a4a;
            padding: 12px;
            display: flex;
            gap: 12px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #555; }
        .card-canvas {
            flex-shrink: 0;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 1px solid #222;
            background: #0a0a18;
        }
        .card-info { flex: 1; min-width: 0; }
        .card-name {
            color: #f5c842;
            font-size: 11px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-zone {
            color: #666;
            font-size: 7px;
            margin-bottom: 8px;
        }
        .card-element {
            display: inline-block;
            padding: 2px 6px;
            font-size: 7px;
            margin-bottom: 6px;
            border: 1px solid;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            margin-bottom: 2px;
        }
        .stat-label { color: #888; }
        .stat-val { color: #ccc; }
        .stat-bar {
            height: 4px;
            background: #1a1a2e;
            margin-top: 1px;
            margin-bottom: 4px;
        }
        .stat-bar-fill { height: 100%; }
        .power-info {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #1a1a2e;
        }
        .power-name { color: #9b59b6; font-size: 8px; }
        .power-dmg { color: #e74c3c; font-size: 7px; }
        .catch-rate {
            font-size: 7px;
            margin-top: 4px;
        }
        .sprite-type {
            font-size: 7px;
            color: #555;
            margin-top: 2px;
        }
        .totals {
            text-align: center;
            color: #666;
            font-size: 8px;
            margin-bottom: 16px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

        { name: 'Prismatic Drake',hp: 140,attack: 19, rubies: 22, catchRate: 0.08, element: 'light',   power: { name: 'Prisma Beam', damage: 36, element: 'light' },   moveType: 'fly', attackType: 'laser', speed: 1.5 },

        { name: 'Sand Serpent',   hp: 60, attack: 9,  rubies: 6,  catchRate: 0.45, element: 'earth',   power: { name: 'Sand Blast', damage: 16, element: 'earth' },     moveType: 'roam', attackType: 'spread', speed: 1.2 },

        { name: 'Boulder Beetle', hp: 90, attack: 10, rubies: 7,  catchRate: 0.4,  element: 'earth',   power: { name: 'Rock Roll', damage: 18, element: 'earth' },      moveType: 'slow', attackType: 'bomb', speed: 0.5 },
        { name: 'Peak Eagle',     hp: 55, attack: 11, rubies: 7,  catchRate: 0.4,  element: 'electric',power: { name: 'Storm Talon', damage: 19, element: 'electric' },  moveType: 'fly', attackType: 'electric', speed: 1.8 },
        { name: 'Snow Wraith',    hp: 65, attack: 13, rubies: 9,  catchRate: 0.3,  element: 'ice',     power: { name: 'Frost Wail', damage: 22, element: 'ice' },       moveType: 'fly', attackType: 'shadow', speed: 1.0 },
        { name: 'Iron Ram',       hp: 95, attack: 14, rubies: 10, catchRate: 0.25, element: 'earth',   power: { name: 'Horn Charge', damage: 24, element: 'earth' },    moveType: 'roam', attackType: 'bite', speed: 1.2 },
        { name: 'Crystal Yeti',   hp: 110,attack: 15, rubies: 12, catchRate: 0.2,  element: 'ice',     power: { name: 'Avalanche', damage: 28, element: 'ice' },        moveType: 'slow', attackType: 'spread', speed: 0.6 }
    ];

    // Zone mapping
    function getZone(i) {
        if (i <= 5) return 'Cave';
        if (i <= 12) return 'Forest';
        if (i <= 16) return 'Temple 1-2';
        if (i <= 20) return 'Temple 3-4';
        if (i <= 26) return 'Temple 5-6';
        if (i <= 28) return 'Temple 7';
        if (i === 29) return 'Boss';
        if (i <= 35) return 'Beach';
        if (i <= 41) return 'Mountains';
        return 'Unknown';
    }

    // Sprite type mapping
    function getEnemySpriteType(name) {
        const map = {
            'Glitch Goblin': 'goblin', 'Rune Beetle': 'goblin',
            'Paradox Bat': 'bat', 'Fang Bat': 'bat', 'Gloom Moth': 'bat', 'Wind Hawk': 'bat', 'Peak Eagle': 'bat', 'Gull Phantom': 'bat',
            'Fallacy Fox': 'fox', 'Shadow Lynx': 'fox', 'Frost Wolf': 'fox',
            'Iron Ram': 'ram',
            'Cave Slug': 'slime', 'Thorn Sprite': 'slime', 'Coral Sprite': 'slime',
            'Crystal Spider': 'spider', 'Cinder Scorpion': 'spider', 'Tide Crab': 'spider',
            'Riddle Wraith': 'ghost', 'Shadow Negator': 'ghost', 'Ice Wraith': 'ghost', 'Void Walker': 'ghost', 'Null Entity': 'ghost', 'Ink Phantom': 'ghost', 'Snow Wraith': 'ghost',
            'Logic Lord': 'dragon', 'Prismatic Drake': 'dragon',
            'Moss Troll': 'golem', 'Stone Sentinel': 'golem', 'Page Golem': 'golem', 'Frost Construct': 'golem', 'Temple Guardian': 'golem', 'Shell Golem': 'golem', 'Boulder Beetle': 'golem', 'Crystal Yeti': 'golem',
            'Ember Wisp': 'fire', 'Magma Beast': 'fire',
            'Lava Serpent': 'snake', 'Sand Serpent': 'snake',
            'Phase Jellyfish': 'jelly', 'Jellyfish Drift': 'jelly',
            'Arch-Logician Zephyr': 'wizard'
        };
        return map[name] || 'goblin';
    }

    // Pixel drawing helpers
    function px(c, x, y, w, h, color) { c.fillStyle = color; c.fillRect(x, y, w, h); }
    function pxo(c, x, y, w, h, color) { c.fillStyle = '#111'; c.fillRect(x-1, y-1, w+2, h+2); c.fillStyle = color; c.fillRect(x, y, w, h); }

    function drawZordSprite(canvas, enemy) {
        const size = 120;
        canvas.width = size;
        canvas.height = size;
        const c = canvas.getContext('2d');
        c.imageSmoothingEnabled = false;

        const el = ELEMENTS[enemy.element] || { color: '#804040' };
        const elColor = el.color;
        const dk = elColor.replace(/[0-9a-f]{2}/gi, m => Math.max(0, parseInt(m, 16) - 40).toString(16).padStart(2, '0'));
        const lt = elColor.replace(/[0-9a-f]{2}/gi, m => Math.min(255, parseInt(m, 16) + 40).toString(16).padStart(2, '0'));

        const ex = size / 2;
        const y = size / 2 + 5;
        const frame = 0;

        // Shadow
        c.fillStyle = 'rgba(0,0,0,0.25)';
        c.beginPath(); c.ellipse(ex, y + 42, 22, 5, 0, 0, Math.PI * 2); c.fill();

        const spriteType = getEnemySpriteType(enemy.name);

        if (spriteType === 'goblin') {
            pxo(c, ex-12, y-8, 24, 28, elColor); px(c, ex-8, y+2, 16, 14, lt);
            pxo(c, ex-10, y-22, 20, 16, elColor); px(c, ex-8, y-18, 16, 10, lt);
            pxo(c, ex-16, y-24, 6, 10, elColor); px(c, ex-14, y-22, 3, 6, lt);
            pxo(c, ex+10, y-24, 6, 10, elColor); px(c, ex+12, y-22, 3, 6, lt);
            px(c, ex-6, y-16, 5, 4, '#fff'); px(c, ex+2, y-16, 5, 4, '#fff');
            px(c, ex-4, y-15, 3, 3, '#200'); px(c, ex+4, y-15, 3, 3, '#200');
            px(c, ex-1, y-12, 4, 4, dk); px(c, ex-5, y-7, 12, 3, '#1a0808');
            px(c, ex-3, y-7, 3, 2, '#fff'); px(c, ex+3, y-7, 3, 2, '#fff');
            pxo(c, ex-18, y-4, 8, 5, dk); pxo(c, ex+12, y-4, 8, 5, dk);
            pxo(c, ex-8, y+20, 8, 10, dk); pxo(c, ex+2, y+20, 8, 10, dk);
            px(c, ex-10, y+28, 12, 3, dk); px(c, ex, y+28, 12, 3, dk);
        } else if (spriteType === 'bat') {
            pxo(c, ex-35, y-10, 24, 14, dk); px(c, ex-32, y-8, 18, 8, elColor);
            pxo(c, ex+12, y-10, 24, 14, dk); px(c, ex+14, y-8, 18, 8, elColor);
            px(c, ex-38, y-14, 6, 6, dk); px(c, ex+34, y-14, 6, 6, dk);
            pxo(c, ex-10, y-6, 20, 18, elColor); px(c, ex-6, y-2, 12, 10, lt);
            pxo(c, ex-8, y-16, 16, 12, elColor);
            px(c, ex-8, y-22, 4, 8, dk); px(c, ex+4, y-22, 4, 8, dk);
            px(c, ex-5, y-13, 4, 3, '#ff2020'); px(c, ex+2, y-13, 4, 3, '#ff2020');
            px(c, ex-4, y-12, 2, 2, '#fff'); px(c, ex+3, y-12, 2, 2, '#fff');
            px(c, ex-3, y-5, 2, 4, '#fff'); px(c, ex+2, y-5, 2, 4, '#fff');
            px(c, ex-6, y+12, 4, 4, dk); px(c, ex+3, y+12, 4, 4, dk);
        } else if (spriteType === 'fox') {
            pxo(c, ex-18, y-4, 36, 18, elColor); px(c, ex-14, y, 28, 10, lt);
            pxo(c, ex-26, y-12, 16, 16, elColor); px(c, ex-24, y-8, 12, 10, lt);
            px(c, ex-30, y-6, 8, 4, lt); px(c, ex-30, y-2, 8, 4, dk);
            px(c, ex-32, y-4, 3, 2, '#111');
            px(c, ex-24, y-20, 4, 10, elColor); px(c, ex-16, y-20, 4, 10, elColor);
            px(c, ex-23, y-18, 2, 6, '#e8a0a0'); px(c, ex-15, y-18, 2, 6, '#e8a0a0');
            px(c, ex-22, y-8, 4, 3, '#fff'); px(c, ex-21, y-7, 2, 2, '#0a0');
            pxo(c, ex+16, y-8, 14, 6, elColor); pxo(c, ex+26, y-12, 8, 6, lt);
            pxo(c, ex-14, y+14, 6, 12, dk); pxo(c, ex-4, y+14, 6, 12, dk);
            pxo(c, ex+6, y+14, 6, 12, dk); pxo(c, ex+14, y+14, 6, 12, dk);
        } else if (spriteType === 'slime') {
            pxo(c, ex-16, y-10, 32, 30, elColor);
            pxo(c, ex-20, y+4, 40, 16, elColor);
            px(c, ex-12, y-4, 24, 18, lt);
            px(c, ex-18, y+18, 4, 6, dk); px(c, ex+14, y+16, 4, 8, dk);
            px(c, ex-8, y-4, 5, 5, '#fff'); px(c, ex+4, y-4, 5, 5, '#fff');
            px(c, ex-6, y-2, 3, 3, '#111'); px(c, ex+6, y-2, 3, 3, '#111');
            px(c, ex-4, y+6, 10, 3, '#1a0808');
            px(c, ex-10, y-8, 4, 4, lt);
        } else if (spriteType === 'spider') {
            pxo(c, ex-4, y+2, 18, 14, dk);
            pxo(c, ex-10, y-10, 20, 18, elColor); px(c, ex-6, y-6, 12, 10, lt);
            for (let i = 0; i < 4; i++) { px(c, ex-8+i*5, y-8, 3, 3, '#ff2020'); px(c, ex-7+i*5, y-7, 1, 1, '#fff'); }
            px(c, ex-4, y+6, 2, 5, '#ddd'); px(c, ex+4, y+6, 2, 5, '#ddd');
            for (let i = 0; i < 4; i++) {
                px(c, ex-16-i*4, y-6+i*5, 8, 2, '#111');
                px(c, ex+10+i*4, y-6+i*5, 8, 2, '#111');
            }
        } else if (spriteType === 'ghost') {
            for (let i = 0; i < 5; i++) {
                const wx = ex - 16 + i * 8, wy = y + 16 + Math.sin(i) * 4;
                px(c, wx, wy, 6, 10, `rgba(${parseInt(elColor.slice(1,3),16)},${parseInt(elColor.slice(3,5),16)},${parseInt(elColor.slice(5,7),16)},0.5)`);
            }
            c.globalAlpha = 0.85;
            pxo(c, ex-16, y-18, 32, 36, elColor); px(c, ex-12, y-12, 24, 24, lt);
            c.globalAlpha = 1;
            pxo(c, ex-14, y-26, 28, 14, dk); px(c, ex-10, y-24, 20, 8, elColor);
            px(c, ex-8, y-16, 6, 6, '#000'); px(c, ex+3, y-16, 6, 6, '#000');
            px(c, ex-6, y-14, 3, 3, elColor); px(c, ex+5, y-14, 3, 3, elColor);
        } else if (spriteType === 'dragon') {
            pxo(c, ex-36, y-24, 20, 20, dk); px(c, ex-32, y-20, 14, 12, elColor);
            pxo(c, ex+18, y-24, 20, 20, dk); px(c, ex+20, y-20, 14, 12, elColor);
            pxo(c, ex-14, y-6, 28, 26, elColor); px(c, ex-10, y-2, 20, 16, lt);
            for (let i = 0; i < 3; i++) px(c, ex-8+i*8, y+2, 5, 4, dk);
            pxo(c, ex-22, y-22, 18, 18, elColor); px(c, ex-18, y-18, 12, 10, lt);
            px(c, ex-28, y-16, 10, 8, elColor); px(c, ex-30, y-14, 4, 3, '#111');
            px(c, ex-18, y-18, 5, 4, '#fff'); px(c, ex-16, y-17, 3, 3, '#c02020');
            px(c, ex-18, y-28, 3, 8, '#c0a040'); px(c, ex-12, y-28, 3, 8, '#c0a040');
            px(c, ex-26, y-10, 2, 3, '#fff'); px(c, ex-22, y-10, 2, 3, '#fff');
            pxo(c, ex+12, y+6, 16, 6, dk); pxo(c, ex+26, y+4, 10, 5, dk); px(c, ex+34, y+2, 6, 4, elColor);
            pxo(c, ex-10, y+20, 8, 12, dk); pxo(c, ex+4, y+20, 8, 12, dk);
            px(c, ex-12, y+30, 12, 3, dk); px(c, ex+2, y+30, 12, 3, dk);
        } else if (spriteType === 'golem') {
            pxo(c, ex-18, y-14, 36, 34, elColor); px(c, ex-14, y-10, 28, 26, lt);
            px(c, ex-10, y-4, 8, 6, dk); px(c, ex+6, y+2, 6, 5, dk); px(c, ex-4, y+10, 10, 4, dk);
            pxo(c, ex-12, y-28, 24, 16, dk); px(c, ex-8, y-24, 16, 8, elColor);
            px(c, ex-6, y-22, 5, 4, '#fff'); px(c, ex+3, y-22, 5, 4, '#fff');
            px(c, ex-4, y-21, 3, 3, '#40a0ff'); px(c, ex+5, y-21, 3, 3, '#40a0ff');
            px(c, ex-4, y-16, 10, 2, '#1a1a1a');
            pxo(c, ex-30, y-8, 14, 10, dk); pxo(c, ex-28, y, 10, 16, elColor);
            pxo(c, ex+18, y-8, 14, 10, dk); pxo(c, ex+20, y, 10, 16, elColor);
            px(c, ex-30, y+14, 12, 8, dk); px(c, ex+20, y+14, 12, 8, dk);
            pxo(c, ex-14, y+20, 12, 14, dk); pxo(c, ex+4, y+20, 12, 14, dk);
        } else if (spriteType === 'fire') {
            pxo(c, ex-14, y-6, 28, 26, elColor); px(c, ex-10, y-2, 20, 16, lt);
            px(c, ex-8, y-14, 16, 10, elColor);
            px(c, ex-4, y-22, 8, 10, '#ff8800'); px(c, ex-2, y-28, 4, 8, '#ffcc00');
            px(c, ex-18, y-8, 6, 10, '#ff6600'); px(c, ex+14, y-10, 6, 12, '#ff6600');
            px(c, ex-6, y-2, 5, 5, '#fff'); px(c, ex+3, y-2, 5, 5, '#fff');
            px(c, ex-4, y, 3, 3, '#111'); px(c, ex+5, y, 3, 3, '#111');
            px(c, ex-5, y+8, 12, 4, '#1a0000');
            px(c, ex-3, y+8, 3, 3, '#ff0'); px(c, ex+3, y+8, 3, 3, '#ff0');
        } else if (spriteType === 'snake') {
            pxo(c, ex-10, y+6, 24, 10, elColor); px(c, ex-6, y+8, 16, 6, lt);
            pxo(c, ex-16, y-2, 20, 10, dk); px(c, ex-12, y, 14, 6, elColor);
            pxo(c, ex-6, y-10, 18, 10, elColor); px(c, ex-2, y-8, 12, 6, lt);
            pxo(c, ex-18, y-20, 16, 14, elColor); px(c, ex-14, y-16, 10, 8, lt);
            px(c, ex-14, y-16, 4, 3, '#fff'); px(c, ex-6, y-16, 4, 3, '#fff');
            px(c, ex-12, y-15, 2, 2, '#c02020'); px(c, ex-4, y-15, 2, 2, '#c02020');
            px(c, ex-22, y-14, 6, 1, '#c03030'); px(c, ex-24, y-15, 2, 1, '#c03030'); px(c, ex-24, y-13, 2, 1, '#c03030');
            pxo(c, ex+12, y+4, 12, 5, dk); px(c, ex+22, y+2, 4, 3, elColor);
        } else if (spriteType === 'ram') {
            // Stocky body
            pxo(c, ex-16, y-4, 32, 22, elColor); px(c, ex-12, y, 24, 14, lt);
            px(c, ex-10, y-2, 6, 4, dk); px(c, ex+4, y+2, 5, 4, dk); px(c, ex-4, y+6, 8, 3, dk);
            // Head
            pxo(c, ex-26, y-14, 18, 18, elColor); px(c, ex-22, y-10, 12, 10, lt);
            // Snout
            px(c, ex-30, y-6, 8, 8, lt);
            px(c, ex-32, y-2, 3, 3, '#222');
            // Eye
            px(c, ex-22, y-10, 4, 3, '#fff'); px(c, ex-20, y-9, 2, 2, '#111');
            // Curled horns - left
            px(c, ex-24, y-24, 6, 4, '#8a7a58');
            px(c, ex-28, y-22, 6, 4, '#8a7a58');
            px(c, ex-30, y-18, 4, 6, '#8a7a58');
            px(c, ex-28, y-14, 4, 4, '#8a7a58');
            px(c, ex-24, y-23, 4, 2, '#a89868');
            px(c, ex-29, y-20, 2, 4, '#a89868');
            // Curled horns - right
            px(c, ex-14, y-24, 6, 4, '#8a7a58');
            px(c, ex-10, y-22, 6, 4, '#8a7a58');
            px(c, ex-8, y-18, 4, 6, '#8a7a58');
            px(c, ex-10, y-14, 4, 4, '#8a7a58');
            px(c, ex-14, y-23, 4, 2, '#a89868');
            px(c, ex-9, y-20, 2, 4, '#a89868');
            // Ears
            px(c, ex-22, y-20, 3, 5, dk); px(c, ex-15, y-20, 3, 5, dk);
            // Legs with hooves
            pxo(c, ex-12, y+18, 8, 14, dk); pxo(c, ex-2, y+18, 8, 14, dk);
            pxo(c, ex+6, y+18, 8, 14, dk);
            px(c, ex-13, y+30, 10, 4, '#333'); px(c, ex-3, y+30, 10, 4, '#333');
            px(c, ex+5, y+30, 10, 4, '#333');
            // Short tail
            px(c, ex+14, y-2, 6, 5, dk); px(c, ex+18, y-4, 4, 4, elColor);
        } else if (spriteType === 'jelly') {
            c.globalAlpha = 0.8;
            pxo(c, ex-16, y-16, 32, 20, elColor); px(c, ex-12, y-12, 24, 12, lt);
            c.globalAlpha = 1;
            px(c, ex-6, y-14, 8, 4, '#fff');
            px(c, ex-6, y-6, 4, 4, '#fff'); px(c, ex+4, y-6, 4, 4, '#fff');
            px(c, ex-4, y-4, 2, 2, '#111'); px(c, ex+6, y-4, 2, 2, '#111');
            for (let i = 0; i < 6; i++) {
                const tx = ex - 14 + i * 6;
                c.fillStyle = `rgba(${parseInt(elColor.slice(1,3),16)},${parseInt(elColor.slice(3,5),16)},${parseInt(elColor.slice(5,7),16)},0.6)`;
                c.fillRect(tx, y + 4, 2, 20 + Math.sin(i) * 6);
            }
        } else { // wizard
            c.fillStyle = 'rgba(160,100,255,0.2)'; c.beginPath(); c.arc(ex, y, 40, 0, Math.PI * 2); c.fill();
            pxo(c, ex-16, y-6, 32, 30, '#2a1050'); px(c, ex-12, y-2, 24, 22, '#3a2060');
            pxo(c, ex-18, y+18, 36, 8, '#1a0838');
            pxo(c, ex-10, y-22, 20, 18, '#ffd5a3'); px(c, ex-6, y-18, 12, 10, '#ffe0b0');
            pxo(c, ex-14, y-28, 28, 10, '#1a0838');
            pxo(c, ex-8, y-38, 16, 12, '#2a1050');
            pxo(c, ex-4, y-48, 8, 12, '#3a2060'); px(c, ex-2, y-52, 4, 6, '#4a3080');
            px(c, ex-1, y-50, 3, 3, '#f0e040');
            px(c, ex-6, y-16, 5, 4, '#fff'); px(c, ex+2, y-16, 5, 4, '#fff');
            px(c, ex-4, y-15, 3, 3, '#8040c0'); px(c, ex+4, y-15, 3, 3, '#8040c0');
            px(c, ex-4, y-6, 10, 8, '#ccc'); px(c, ex-2, y, 6, 6, '#ddd');
            px(c, ex+20, y-40, 3, 50, '#5a3010');
            c.fillStyle = '#c060ff'; c.beginPath(); c.arc(ex+21, y-44, 6, 0, Math.PI*2); c.fill();
            c.fillStyle = '#e0a0ff'; c.beginPath(); c.arc(ex+21, y-45, 3, 0, Math.PI*2); c.fill();
        }
    }

    // Max stats for bar scaling
    const maxHp = Math.max(...ENEMIES.map(e => e.hp));
    const maxAtk = Math.max(...ENEMIES.map(e => e.attack));
    const maxSpd = Math.max(...ENEMIES.map(e => e.speed));
    const maxDmg = Math.max(...ENEMIES.map(e => e.power.damage));

    // Build filter buttons
    const zones = [...new Set(ENEMIES.map((_, i) => getZone(i)))];
    const elements = [...new Set(ENEMIES.map(e => e.element))];
    const filtersEl = document.getElementById('filters');
    let activeZone = 'All';
    let activeElement = 'All';

    function renderFilters() {
        filtersEl.innerHTML = '';
        // Zone filters
        const zoneLabel = document.createElement('span');
        zoneLabel.style.cssText = 'color:#666;font-size:7px;align-self:center;margin-right:4px;';
        zoneLabel.textContent = 'Zone:';
        filtersEl.appendChild(zoneLabel);

        ['All', ...zones].forEach(z => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn' + (activeZone === z ? ' active' : '');
            btn.textContent = z;
            btn.onclick = () => { activeZone = z; renderFilters(); renderGrid(); };
            filtersEl.appendChild(btn);
        });

        filtersEl.appendChild(document.createElement('br'));

        const elLabel = document.createElement('span');
        elLabel.style.cssText = 'color:#666;font-size:7px;align-self:center;margin-right:4px;';
        elLabel.textContent = 'Element:';
        filtersEl.appendChild(elLabel);

        ['All', ...elements].forEach(e => {
            const el = ELEMENTS[e];
            const btn = document.createElement('button');
            btn.className = 'filter-btn' + (activeElement === e ? ' active' : '');
            btn.textContent = e === 'All' ? 'All' : (el ? el.icon + ' ' + el.name : e);
            if (el) btn.style.borderColor = activeElement === e ? el.color : '';
            btn.onclick = () => { activeElement = e; renderFilters(); renderGrid(); };
            filtersEl.appendChild(btn);
        });
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        let shown = 0;
        ENEMIES.forEach((enemy, i) => {
            const zone = getZone(i);
            if (activeZone !== 'All' && zone !== activeZone) return;
            if (activeElement !== 'All' && enemy.element !== activeElement) return;
            shown++;

            const el = ELEMENTS[enemy.element] || { color: '#888', name: enemy.element, icon: '' };
            const spriteType = getEnemySpriteType(enemy.name);

            const card = document.createElement('div');
            card.className = 'card';

            const canvas = document.createElement('canvas');
            canvas.className = 'card-canvas';
            canvas.style.width = '100px';
            canvas.style.height = '100px';
            drawZordSprite(canvas, enemy);

            const info = document.createElement('div');
            info.className = 'card-info';

            const catchLabel = enemy.catchRate === 0 ? 'UNCATCHABLE' :
                enemy.catchRate <= 0.1 ? 'Legendary' :
                enemy.catchRate <= 0.25 ? 'Rare' :
                enemy.catchRate <= 0.4 ? 'Uncommon' : 'Common';
            const catchColor = enemy.catchRate === 0 ? '#e94560' :
                enemy.catchRate <= 0.1 ? '#f5c842' :
                enemy.catchRate <= 0.25 ? '#9b59b6' :
                enemy.catchRate <= 0.4 ? '#4ecca3' : '#888';

            info.innerHTML = `
                <div class="card-name">#${i} ${enemy.name}</div>
                <div class="card-zone">${zone} | Sprite: ${spriteType}</div>
                <span class="card-element" style="color:${el.color};border-color:${el.color}">${el.icon} ${el.name}</span>

                <div class="stat-row"><span class="stat-label">HP</span><span class="stat-val">${enemy.hp}</span></div>
                <div class="stat-bar"><div class="stat-bar-fill" style="width:${enemy.hp/maxHp*100}%;background:#4ecca3"></div></div>

                <div class="stat-row"><span class="stat-label">ATK</span><span class="stat-val">${enemy.attack}</span></div>
                <div class="stat-bar"><div class="stat-bar-fill" style="width:${enemy.attack/maxAtk*100}%;background:#e94560"></div></div>

                <div class="stat-row"><span class="stat-label">Speed</span><span class="stat-val">${enemy.speed}</span></div>
                <div class="stat-bar"><div class="stat-bar-fill" style="width:${enemy.speed/maxSpd*100}%;background:#f1c40f"></div></div>

                <div class="stat-row"><span class="stat-label">Rubies</span><span class="stat-val">${enemy.rubies}</span></div>
                <div class="stat-row"><span class="stat-label">Move</span><span class="stat-val">${enemy.moveType}</span></div>
                <div class="stat-row"><span class="stat-label">Attack</span><span class="stat-val">${enemy.attackType}</span></div>

                <div class="power-info">
                    <span class="power-name">${enemy.power.name}</span>
                    <span class="power-dmg"> (${enemy.power.damage} dmg, ${enemy.power.element})</span>
                    <div class="stat-bar"><div class="stat-bar-fill" style="width:${enemy.power.damage/maxDmg*100}%;background:#9b59b6"></div></div>
                </div>

                <div class="catch-rate" style="color:${catchColor}">Catch: ${(enemy.catchRate * 100).toFixed(0)}% - ${catchLabel}</div>
            `;

            card.appendChild(canvas);
            card.appendChild(info);
            grid.appendChild(card);
        });

        document.getElementById('totals').textContent = `Showing ${shown} of ${ENEMIES.length} Zords`;
    }

    renderFilters();
    renderGrid();
    </script>
</body>
</html>
